services:
  backend:
    restart: always
    build:
      context: ./services/backend
      target: dev
    volumes:
      - ./services/backend/cmd:/usr/src/app/cmd
      - ./services/backend/internal:/usr/src/app/internal
    environment:
      - name=value
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 10s
    ports:
      - 8080:8080
  web-app:
    restart: always
    build:
      context: ./services/web-app
      target: dev
    volumes:
      - ./services/web-app/src:/usr/src/app/src
    ports:
      - 5173:5173
    depends_on:
      backend:
        condition: service_healthy